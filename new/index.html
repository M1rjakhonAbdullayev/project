  <style>
    :root {
      --bg: #080808;
      --bg2: #111111;
      --bg3: #1a1a1a;
      --surface: #161616;
      --border: rgba(255,255,255,0.07);
      --text: #f0f0ec;
      --text-muted: #6b6b6b;
      --text-soft: #a0a0a0;
      --accent: #c8f135;
      --accent-dim: rgba(200,241,53,0.12);
      --accent-glow: rgba(200,241,53,0.25);
    }
    [data-theme="light"] {
      --bg: #f4f4ef;
      --bg2: #ebebе5;
      --bg3: #e0e0da;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.08);
      --text: #111111;
      --text-muted: #888888;
      --text-soft: #555555;
      --accent: #2d7a00;
      --accent-dim: rgba(45,122,0,0.1);
      --accent-glow: rgba(45,122,0,0.2);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Bricolage Grotesque', sans-serif;
      overflow-x: hidden;
      transition: background 0.4s, color 0.4s;
      cursor: none;
    }
    /* Custom cursor */
    /* #cursor {
      width: 12px; height: 12px;
      background: var(--accent);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%,-50%);
      transition: transform 0.08s, width 0.2s, height 0.2s, opacity 0.2s;

    } */
    /* #cursor-ring {
      width: 38px; height: 38px;
      border: 1.5px solid var(--accent);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9998;

    body:hover #cursor { opacity: 1; }
    .display-font { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.04em; }
    .mono { font-family: 'DM Mono', monospace; }
    /* Nav */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.3s, backdrop-filter 0.3s;
    }
    nav.scrolled {
      background: rgba(8,8,8,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    [data-theme="light"] nav.scrolled { background: rgba(244,244,239,0.85); }
    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.12em;
      color: var(--accent);
    }
    .nav-links { display: flex; gap: 32px; align-items: center; }
    .nav-link {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-soft);
      text-decoration: none;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: none;
      transition: color 0.2s;
      position: relative;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 0;
      width: 0; height: 1.5px;
      background: var(--accent);
      transition: width 0.25s;
    }
    .nav-link:hover { color: var(--text); }
    .nav-link:hover::after { width: 100%; }
    /* Theme toggle */
    .theme-btn {
      width: 44px; height: 24px;
      background: var(--bg3);
      border-radius: 12px;
      border: 1px solid var(--border);
      cursor: none;
      position: relative;
      transition: background 0.3s;
    }
    .theme-thumb {
      width: 18px; height: 18px;
      background: var(--accent);
      border-radius: 50%;
      position: absolute;
      top: 2px; left: 3px;
      transition: left 0.25s;
    }
    [data-theme="light"] .theme-thumb { left: 23px; }
    /* Hamburger */
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: none; }
    .hamburger span { width: 24px; height: 1.5px; background: var(--text); transition: all 0.3s; display: block; }
    /* Sections */
    section { position: relative; }
    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-label::before {
      content: '';
      width: 24px; height: 1px;
      background: var(--accent);
    }
    /* Hero */
    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 120px 40px 80px;
      position: relative;
      overflow: hidden;
    }
    .hero-grid-bg {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    }
    .hero-glow {
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,241,53,0.08) 0%, transparent 70%);
      top: 50%; left: 20%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    [data-theme="light"] .hero-glow { background: radial-gradient(circle, rgba(45,122,0,0.06) 0%, transparent 70%); }
    .hero-num {
      position: absolute;
      right: 40px; bottom: 60px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 220px;
      color: rgba(255,255,255,0.025);
      line-height: 1;
      pointer-events: none;
      user-select: none;
    }
    [data-theme="light"] .hero-num { color: rgba(0,0,0,0.04); }
    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(72px, 12vw, 160px);
      line-height: 0.92;
      letter-spacing: 0.02em;
      position: relative;
    }
    .hero-title .accent-line { color: var(--accent); display: block; }
    .hero-subtitle {
      font-size: clamp(16px, 2vw, 20px);
      color: var(--text-soft);
      font-weight: 300;
      line-height: 1.7;
      max-width: 500px;
      margin-top: 24px;
    }
    .cursor-blink {
      display: inline-block;
      width: 3px; height: 1.1em;
      background: var(--accent);
      margin-left: 3px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .hero-ctas { display: flex; gap: 16px; margin-top: 40px; flex-wrap: wrap; }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: #080808;
      padding: 14px 28px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: none;
      transition: transform 0.2s, box-shadow 0.2s;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 32px var(--accent-glow); }
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: var(--text);
      padding: 13px 28px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid var(--border);
      cursor: none;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    /* Scroll indicator */
    .scroll-indicator {
      position: absolute;
      bottom: 40px; left: 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
    }
    .scroll-line {
      width: 1px; height: 40px;
      background: linear-gradient(to bottom, var(--accent), transparent);
      animation: scrollDown 1.8s ease infinite;
    }
    @keyframes scrollDown { 0%{transform:scaleY(0);transform-origin:top} 50%{transform:scaleY(1);transform-origin:top} 51%{transform-origin:bottom} 100%{transform:scaleY(0);transform-origin:bottom} }
    /* About */
    #about {
      padding: 120px 40px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: start;
      margin-top: 48px;
    }
    .about-avatar {
      position: relative;
    }
    .avatar-frame {
      width: 100%;
      aspect-ratio: 3/4;
      max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .avatar-frame::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent-dim) 0%, transparent 60%);
    }
    .avatar-frame::after {
      content: '';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 100px;
      color: var(--accent);
      opacity: 0.15;
    }
    .avatar-initials {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 110px;
      color: var(--accent);
      opacity: 0.2;
    }
    /* .avatar-border {
      position: absolute;
      bottom: -16px; right: -16px;
      width: 100%; height: 100%;
      max-width: 340px;
      border: 1px solid var(--accent);
      opacity: 0.3;
    } */
   /* .avatar-tag {
      position: absolute;
      bottom: 20px; left: 20px;
      background: var(--accent);
      color: #080808;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 14px;

    }  */
    .about-text p {
      font-size: 16px;
      color: var(--text-soft);
      line-height: 1.9;
      margin-bottom: 16px;
    }
    .about-text p strong { color: var(--text); font-weight: 600; }
    .about-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      margin-top: 40px;
      border: 1px solid var(--border);
      background: var(--border);
    }
    .stat-box {
      background: var(--bg);
      padding: 24px;
      text-align: center;
    }
    .stat-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      color: var(--accent);
      line-height: 1;
    }
    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 4px;
    }
    /* Skills */
    #skills {
      padding: 120px 40px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 48px;
    }
    .skill-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 28px;
      position: relative;
      transition: border-color 0.3s, transform 0.3s;
      overflow: hidden;
    }
    .skill-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      height: 2px;
      width: 0;
      background: var(--accent);
      transition: width 0.4s ease;
    }
    .skill-card:hover { border-color: rgba(200,241,53,0.3); transform: translateY(-4px); }
    .skill-card:hover::before { width: 100%; }
    .skill-icon { font-size: 32px; margin-bottom: 14px; display: block; }
    .skill-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }
    .skill-bar-track {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .skill-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0;
      transition: width 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .skill-percent {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
    }
    .skill-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .skill-tag {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      background: var(--accent-dim);
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 2px;
      letter-spacing: 0.05em;
    }
    /* Projects */
    #projects {
      padding: 120px 40px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 24px;
      margin-top: 48px;
    }
    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
      position: relative;
      transition: transform 0.3s, border-color 0.3s;
    }
    .project-card:hover { transform: translateY(-6px); border-color: rgba(200,241,53,0.25); }
    .project-thumb {
      height: 220px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .project-thumb-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
    }
    [data-theme="light"] .project-thumb-overlay { background: rgba(0,0,0,0.45); }
    .project-card:hover .project-thumb-overlay { opacity: 1; }
    .project-demo-btn {
      background: var(--accent);
      color: #080808;
      padding: 12px 24px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: none;
      transform: translateY(10px);
      transition: transform 0.3s;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
    }
    .project-card:hover .project-demo-btn { transform: translateY(0); }
    .project-num {
      position: absolute;
      top: 16px; left: 16px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      background: rgba(8,8,8,0.7);
      padding: 4px 8px;
    }
    .project-body { padding: 24px; }
    .project-cat {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .project-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
      line-height: 1.1;
    }
    .project-desc {
      font-size: 13px;
      color: var(--text-soft);
      line-height: 1.7;
      margin-bottom: 16px;
    }
    .project-stack { display: flex; flex-wrap: wrap; gap: 6px; }
    .project-tech {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      background: var(--bg3);
      color: var(--text-muted);
      padding: 3px 8px;
      border: 1px solid var(--border);
      letter-spacing: 0.05em;
    }
    /* Social */
    #social {
      padding: 80px 40px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .social-strip {
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 60px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 48px;
      flex-wrap: wrap;
    }
    .social-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      cursor: none;
    }
    .social-icon-box {
      width: 64px; height: 64px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: border-color 0.3s, background 0.3s, transform 0.3s;
      position: relative;
      overflow: hidden;
    }
    .social-icon-box::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.3s;
    }
    .social-icon-box span { position: relative; z-index: 1; transition: transform 0.3s; }
    .social-link:hover .social-icon-box { border-color: var(--accent); transform: translateY(-4px); }
    .social-link:hover .social-icon-box::before { transform: scaleY(1); }
    .social-name {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    /* Contact */
    #contact {
      padding: 120px 40px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .contact-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      margin-top: 48px;
    }
    .contact-info h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      line-height: 1.1;
      letter-spacing: 0.03em;
      margin-bottom: 16px;
    }
    .contact-info h3 span { color: var(--accent); }
    .contact-info p {
      font-size: 15px;
      color: var(--text-soft);
      line-height: 1.8;
      margin-bottom: 32px;
    }
    .contact-detail {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }
    .contact-icon {
      width: 40px; height: 40px;
      background: var(--accent-dim);
      border: 1px solid rgba(200,241,53,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .contact-detail-text { font-size: 14px; color: var(--text-soft); }
    .contact-detail-text strong { color: var(--text); display: block; font-size: 12px; letter-spacing: 0.05em; margin-bottom: 2px; }
    /* Form */
    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 14px 16px;
      font-size: 14px;
      font-family: 'Bricolage Grotesque', sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .form-input::placeholder { color: var(--text-muted); }
    .form-input:focus { border-color: var(--accent); background: var(--bg2); }
    textarea.form-input { resize: vertical; min-height: 140px; }
    .form-success {
      background: var(--accent-dim);
      border: 1px solid rgba(200,241,53,0.3);
      padding: 16px;
      font-size: 14px;
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      text-align: center;
      display: none;
    }
    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }
    .footer-left {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
    }
    .footer-logo { color: var(--accent); font-weight: 500; }
    .footer-right { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
    .footer-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s ease infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.7)} }
    /* Animations */
    .fade-up {
      opacity: 0;

/* ─── TYPING HOOK ─────────────────────────────────── */
function useTyping(words, speed = 100, deleteSpeed = 60, pause = 1600) {
  const [text, setText] = useState('');
  const [wordIdx, setWordIdx] = useState(0);
  const [typing, setTyping] = useState(true);
  const timeout = useRef(null);

  useEffect(() => {
    const word = words[wordIdx];
    if (typing) {
      if (text.length < word.length) {
        timeout.current = setTimeout(() => setText(word.slice(0, text.length + 1)), speed);
      } else {
        timeout.current = setTimeout(() => setTyping(false), pause);
      }
    } else {
      if (text.length > 0) {
        timeout.current = setTimeout(() => setText(text.slice(0, -1)), deleteSpeed);
      } else {
        setWordIdx((wordIdx + 1) % words.length);
        setTyping(true);
      }
    }
    return () => clearTimeout(timeout.current);
  }, [text, typing, wordIdx, words, speed, deleteSpeed, pause]);

  return text;
}

/* ─── INTERSECTION HOOK ───────────────────────────── */
function useIntersection(ref, threshold = 0.15) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { setVisible(true); obs.disconnect(); }
    }, { threshold });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [ref, threshold]);
  return visible;
}

  /* SNAKE CURSOR */

useEffect(() => {

  const snakeLength = 10;
  const snake = [];

  let mouse = {
    x: window.innerWidth / 2,
    y: window.innerHeight / 2
  };

  for(let i = 0; i < snakeLength; i++){

    const div = document.createElement("div");

    div.className = "snake-cursor";

    document.body.appendChild(div);

    snake.push({
      el: div,
      x: mouse.x,
      y: mouse.y
    });
  }

  const move = (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  };

  window.addEventListener("mousemove", move);

  const animate = () => {

    let x = mouse.x;
    let y = mouse.y;

    snake.forEach((part, index) => {

      const nextX = part.x;
      const nextY = part.y;

      part.x += (x - part.x) * 0.10;
      part.y += (y - part.y) * 0.10;

      part.el.style.left = part.x + "px";
      part.el.style.top = part.y + "px";

      part.el.style.scale =
        (snakeLength - index) / snakeLength;

      x = nextX;
      y = nextY;
    });

    requestAnimationFrame(animate);
  };

  animate();

  return () => {

    window.removeEventListener("mousemove", move);

    snake.forEach((part) => {
      part.el.remove();
    });

  };

}, []);

  /* Scroll */

    const onScroll = () => setScrolled(window.scrollY > 60);

    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  /* Section fade-up observer */

    const els = document.querySelectorAll('.fade-up');
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);

  const scrollTo = (id) => {
    document.querySelector(id)?.scrollIntoView({ behavior: 'smooth' });

      <a

        {label}
      </a>
    ))}

    {/* 🔥 UIVERSE STYLE SWITCH */}
    <div className="container">
      <input
        type="checkbox"
        id="checkbox"
        checked={theme === 'light'}
        onChange={() =>
          setTheme(t => (t === 'dark' ? 'light' : 'dark'))
        }
      />

      <label htmlFor="checkbox" className="label"></label>
    </div>
  </div>

  {/* MOBILE HAMBURGER */}
  <div
    className={`hamburger ${mobileOpen ? 'nav-open' : ''}`}
    onClick={() => setMobileOpen(o => !o)}

  </div>

  <style>{`
    @media(max-width:768px){
      #hamburger{display:flex!important;}
    }
  `}</style>
